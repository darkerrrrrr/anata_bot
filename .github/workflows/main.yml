name: Run Discord Bot

on:
  push:
    branches:
      - main
  workflow_dispatch: # 手動起動用
  schedule:
    # 💡 6時間の制限を回避するため、5時間30分ごとに次のBotを自動起動
    - cron: '30 */5 * * *'

# 💡 新しいコンテナが立ち上がった瞬間、古いコンテナを自動で強制終了させてバトンタッチします
permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      # 🛠️ 【最新】Node 24へ完全対応した最新のメジャーバージョンを指定
      - name: Checkout repository
        uses: actions/checkout@v5

      # 🛠️ 【最新】Node 24環境下でPython 3.11を正しくセットアップする最新アクション
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 今回のBotに必要な「discord.py」のみを軽量インストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py

      - name: Run Python Script
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        # あなたのファイル名に合わせて bot.py を実行します
        run: python bot.py
