name: Run Discord Bot

on:
  push:
    branches:
      - main  # あなたのメインブランチ名に合わせてください（masterの場合は master に変更）
  workflow_dispatch: # 手動で起動できるようにするボタン

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 安定して動くPythonのバージョンを指定

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install discord.py python-dotenv reportlab
        # もし他にも使っているライブラリがあればここに半角スペースを空けて足してください

    - name: Run Python Script
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }} # GitHubのSecretsからトークンを安全に読み込みます
      run: python main.py
